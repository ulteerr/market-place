name: ${COMPOSE_PROJECT_NAME:-marketplace}

services:
  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:${WEB_PORT:-8080}
      NUXT_PUBLIC_REVERB_ENABLED: ${NUXT_PUBLIC_REVERB_ENABLED:-true}
      NUXT_PUBLIC_REVERB_APP_KEY: ${NUXT_PUBLIC_REVERB_APP_KEY:-local-app-key}
      NUXT_PUBLIC_REVERB_HOST: ${NUXT_PUBLIC_REVERB_HOST:-localhost}
      NUXT_PUBLIC_REVERB_PORT: ${NUXT_PUBLIC_REVERB_PORT:-8083}
      NUXT_PUBLIC_REVERB_SCHEME: ${NUXT_PUBLIC_REVERB_SCHEME:-http}
      NUXT_PUBLIC_REVERB_AUTH_ENDPOINT: ${NUXT_PUBLIC_REVERB_AUTH_ENDPOINT:-/broadcasting/auth}
      FRONTEND_INSTALL_OWNER: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./frontend:/app
      - ./docker/playwright/cache:/ms-playwright
    depends_on:
      - backend
    networks:
      - app

  frontend-storybook:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    restart: unless-stopped
    ports:
      - "${STORYBOOK_PORT:-6006}:6006"
    volumes:
      - ./frontend:/app
      - ./docker/playwright/cache:/ms-playwright
    command: ["npm", "run", "storybook"]
    depends_on:
      - frontend
    networks:
      - app

  backend-node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    restart: unless-stopped
    entrypoint:
      [
        "sh",
        "-lc",
        "if [ ! -d node_modules ] || [ ! -f node_modules/.bin/prettier ]; then npm install; fi; tail -f /dev/null"
      ]
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www
      - ./docker/swagger:/var/docker/swagger:ro
    networks:
      - app

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${REVERB_PORT:-8083}:8080"
    volumes:
      - ./backend:/var/www
    depends_on:
      - backend
      - redis
    networks:
      - app

  presence-watcher:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "presence:watch-offline"]
    volumes:
      - ./backend:/var/www
    depends_on:
      - backend
      - redis
    networks:
      - app

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: laravel_db
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./docker/data/db:/var/lib/postgresql/data
    networks:
      - app

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./docker/data/pgadmin:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - app

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--notify-keyspace-events", "Ex"]
    volumes:
      - ./docker/data/redis:/data
    ports:
      - "${REDIS_PORT:-6381}:6379"
    networks:
      - app

  swagger-ui:
    image: swaggerapi/swagger-ui
    restart: unless-stopped
    ports:
      - "${SWAGGER_UI_PORT:-8081}:8080"
    environment:
      SWAGGER_JSON: /swagger/openapi.yaml
    volumes:
      - ./docker/swagger:/swagger:ro
    networks:
      - app

  redoc:
    image: redocly/redoc
    restart: unless-stopped
    entrypoint: ["nginx", "-g", "daemon off;"]
    ports:
      - "${REDOC_PORT:-8082}:80"
    volumes:
      - ./docker/redoc/index.html:/usr/share/nginx/html/index.html:ro
      - ./docker/swagger:/usr/share/nginx/html/swagger:ro
    networks:
      - app


networks:
  app:
    driver: bridge
