admin_action_logs:
  get:
    tags: [Admin ActionLog]
    summary: List action log entries (admin)
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          example: 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
      - name: event
        in: query
        required: false
        schema:
          type: string
          example: updated
      - name: model
        in: query
        required: false
        schema:
          type: string
          example: organizations
      - name: model_id
        in: query
        required: false
        schema:
          type: string
          format: uuid
      - name: user
        in: query
        required: false
        schema:
          type: string
          example: admin@example.com
      - name: search
        in: query
        required: false
        schema:
          type: string
          example: transfer
      - name: date_from
        in: query
        required: false
        schema:
          type: string
          format: date
          example: 2026-03-01
      - name: date_to
        in: query
        required: false
        schema:
          type: string
          format: date
          example: 2026-03-31
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          example: created_at
      - name: sort_dir
        in: query
        required: false
        schema:
          type: string
          enum: [asc, desc]
          example: desc
    responses:
      '200':
        description: Paginated action log entries
        content:
          application/json:
            schema:
              type: object
              required: [status, data]
              properties:
                status:
                  type: string
                  example: ok
                data:
                  type: object
                  properties:
                    current_page:
                      type: integer
                      example: 1
                    data:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          user_id:
                            type: string
                            format: uuid
                            nullable: true
                          user:
                            type: object
                            nullable: true
                            properties:
                              id:
                                type: string
                                format: uuid
                              full_name:
                                type: string
                                nullable: true
                              email:
                                type: string
                                format: email
                                nullable: true
                          event:
                            type: string
                            example: updated
                          model_type:
                            type: string
                            example: Modules\\Organizations\\Models\\Organization
                          model_id:
                            type: string
                            format: uuid
                            nullable: true
                          ip_address:
                            type: string
                            nullable: true
                            example: 127.0.0.1
                          before:
                            type: object
                            nullable: true
                            additionalProperties: true
                          after:
                            type: object
                            nullable: true
                            additionalProperties: true
                          changed_fields:
                            type: array
                            items:
                              type: string
                          created_at:
                            type: string
                            format: date-time
                    first_page_url:
                      type: string
                      nullable: true
                    from:
                      type: integer
                      nullable: true
                    last_page:
                      type: integer
                      example: 1
                    last_page_url:
                      type: string
                      nullable: true
                    links:
                      type: array
                      items:
                        type: object
                        properties:
                          url:
                            type: string
                            nullable: true
                          label:
                            type: string
                          active:
                            type: boolean
                    next_page_url:
                      type: string
                      nullable: true
                    path:
                      type: string
                    per_page:
                      type: integer
                      example: 20
                    prev_page_url:
                      type: string
                      nullable: true
                    to:
                      type: integer
                      nullable: true
                    total:
                      type: integer
                      example: 25
      '401':
        $ref: ../errors.yaml#/UnauthorizedError
      '403':
        $ref: ../errors.yaml#/ForbiddenError
