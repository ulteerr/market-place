admin_users:
  get:
    tags: [Admin Users]
    summary: List users (admin)
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          example: 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
      - name: search
        in: query
        required: false
        schema:
          type: string
          example: Иванов
        description: Search by id, email, first_name, last_name, middle_name, gender, phone, role code or role label.
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          enum: [id, first_name, last_name, middle_name, gender, birth_date, created_at, name, access]
          example: last_name
      - name: sort_dir
        in: query
        required: false
        schema:
          type: string
          enum: [asc, desc]
          example: asc
    responses:
      '200':
        description: Paginated users list
        content:
          application/json:
            schema:
              $ref: ../schemas/user.yaml#/components/schemas/AdminUsersPaginatedResponse
      '401':
        $ref: ../errors.yaml#/UnauthorizedError
      '403':
        $ref: ../errors.yaml#/ForbiddenError

  post:
    tags: [Admin Users]
    summary: Create user (admin)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/user.yaml#/components/schemas/CreateAdminUserRequest
    responses:
      '201':
        description: User created
        content:
          application/json:
            schema:
              type: object
              required: [status, message, data]
              properties:
                status:
                  type: string
                  example: ok
                message:
                  type: string
                  example: Created successfully
                data:
                  $ref: ../schemas/user.yaml#/components/schemas/User
      '401':
        $ref: ../errors.yaml#/UnauthorizedError
      '403':
        $ref: ../errors.yaml#/ForbiddenError
      '422':
        $ref: ../errors.yaml#/ValidationError

