login:
  post:
    tags: [Auth]
    summary: User login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/auth.yaml#/components/schemas/LoginRequest
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              $ref: ../schemas/auth.yaml#/components/schemas/AuthResponse
      '401':
        $ref: ../errors.yaml#/UnauthorizedError


register:
  post:
    tags: [Auth]
    summary: User registration
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/auth.yaml#/components/schemas/RegisterRequest
    responses:
      '201':
        description: User registered
        content:
          application/json:
            schema:
              $ref: ../schemas/auth.yaml#/components/schemas/AuthResponse
      '422':
        $ref: ../errors.yaml#/ValidationError

logout:
  post:
    tags: [Auth]
    summary: User logout
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Logout successful
        content:
          application/json:
            schema:
              type: object
              required: [status, message]
              properties:
                status:
                  type: string
                  example: ok
                message:
                  type: string
                  example: Logged out successfully
      '401':
        $ref: ../errors.yaml#/UnauthorizedError
